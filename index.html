<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow"> 
  <title>Kind by Design - Career Playbook</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=VT323&family=Shrikhand&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    @font-face {
      font-family: 'Kindfield';
      src: url('Kindfield-Regular.otf') format('opentype');
    }

    body {
      font-family: 'Lexend', sans-serif;
      background-color: #FFF3FC; 
      color: #000000;
      overflow: hidden; 
    }

    .pixel-text {
      font-family: 'VT323', monospace;
    }

    .brand-wordmark {
      font-family: 'Kindfield', 'Shrikhand', sans-serif;
      font-weight: 400 !important;
      text-transform: none !important;
      font-variant-ligatures: normal !important;
      letter-spacing: 0em;
      line-height: 1.2 !important;
    }

    .zine-texture {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0.04;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .window-shadow {
      box-shadow: 4px 4px 0px 0px #000000;
    }

    .window-shadow-heavy {
      box-shadow: 8px 8px 0px 0px #000000;
    }
  </style>
</head>

<body class="relative min-h-screen text-black selection:bg-[#A8003A] selection:text-white">

  <div class="zine-texture"></div>
  <canvas id="pixelCanvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-50"></canvas>

  <header class="fixed inset-0 w-full h-screen bg-[#FFCFEE] z-50 flex flex-col justify-center items-center px-4 overflow-hidden">
    <div class="absolute inset-0 opacity-10 bg-[linear-gradient(to_right,#000_1px,transparent_1px),linear-gradient(to_bottom,#000_1px,transparent_1px)] bg-[size:30px_30px]"></div>
    
    <div class="z-10 text-center uppercase tracking-tight w-full max-w-2xl px-4 flex flex-col items-center justify-center space-y-6">
      
      <div id="playbookHeaderCard" class="bg-white border-4 border-black p-6 w-full max-w-xl window-shadow-heavy opacity-0 transform -translate-y-4 transition-all duration-700">
        <span class="text-xs bg-[#EFE1FC] text-black border border-black font-bold px-2 py-0.5 rounded-sm pixel-text block w-max mx-auto tracking-widest">
          Work in Progress
        </span>
        <h1 class="text-3xl md:text-5xl font-bold tracking-tight mt-3 text-black font-mono">
          Career Playbook
        </h1>
        <div class="mt-4 text-sm tracking-normal font-normal lowercase brand-wordmark text-[#A8003A]">
          by Kind by Design
        </div>
      </div>

      <div id="playbookStatusCard" class="bg-white border-4 border-black p-5 w-full max-w-lg window-shadow opacity-0 transform translate-y-4 transition-all duration-700 delay-300">
        <div class="bg-black text-white px-2 py-0.5 font-mono text-[10px] uppercase tracking-widest w-max mb-3">
          Warning
        </div>
        <p class="text-xs font-medium tracking-wide text-left text-gray-800 font-mono leading-relaxed normal-case">
          The Career Playbook is currently undergoing final content assembly. The complete interactive handbook will initialize shortly.
        </p>
        <p class="text-xs font-bold tracking-wide text-left text-gray-800 font-mono leading-relaxed normal-case">
          Thank you for your patience.<3
        </p>
      </div>

    </div>
  </header>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const hCard = document.getElementById('playbookHeaderCard');
      const sCard = document.getElementById('playbookStatusCard');

      // Trigger structural card elements entrance loop
      setTimeout(() => {
        hCard.classList.remove('opacity-0', '-translate-y-4');
        hCard.classList.add('opacity-100', 'translate-y-0');
      }, 200);

      setTimeout(() => {
        sCard.classList.remove('opacity-0', 'translate-y-4');
        sCard.classList.add('opacity-100', 'translate-y-0');
      }, 550);
    });

    // Particle Logic
    const pixelCanvas = document.getElementById('pixelCanvas');
    const pCtx = pixelCanvas.getContext('2d');
    let pxArray = [];
    const colorMatrix = ['#D3B0EA', '#A8003A', '#FFF3FC', '#000000'];

    function resizePxCanvas() { pixelCanvas.width = window.innerWidth; pixelCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizePxCanvas);
    resizePxCanvas();

    window.addEventListener('mousemove', (e) => {
      if (Math.random() > 0.4) {
        pxArray.push({
          x: e.clientX, y: e.clientY,
          size: Math.floor(Math.random() * 4) + 4,
          color: colorMatrix[Math.floor(Math.random() * colorMatrix.length)],
          alpha: 1, vy: Math.random() * 2 + 0.6
        });
      }
    });

    function loopPixels() {
      pCtx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);
      pxArray.forEach(p => {
        p.y += p.vy; p.alpha -= 0.02;
        pCtx.fillStyle = p.color; pCtx.globalAlpha = p.alpha;
        pCtx.fillRect(p.x, p.y, p.size, p.size);
      });
      pxArray = pxArray.filter(p => p.alpha > 0);
      pCtx.globalAlpha = 1.0;
      requestAnimationFrame(loopPixels);
    }
    loopPixels();
  </script>
</body>

</html>
